---
- name: Deploy Flask app to Kubernetes
  hosts: localhost
  connection: local
  environment:
    KUBECONFIG: /tmp/kubeconfig
  tasks:

    - name: Apply Deployment
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../k8s/deployment.yaml"

    - name: Apply Service
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../k8s/service.yaml"

    - name: Wait for deployment to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: flask-app
        namespace: flask-app
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120
      register: deploy_info

    - name: Show deployment status
      debug:
        msg: "Deployment ready: {{ deploy_info.resources[0].status.availableReplicas }} replica(s) available"
